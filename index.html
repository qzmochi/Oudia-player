<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oudia Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #ccc;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #16162a;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #toolbar label {
      font-size: 13px;
    }
    #toolbar button {
      background: #2a2a4a;
      color: #ccc;
      border: 1px solid #444;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #toolbar button:hover { background: #3a3a5a; }
    #toolbar button.active { background: #4a4a7a; border-color: #6a6aaa; }
    #speed-display {
      font-size: 13px;
      color: #aaa;
      min-width: 40px;
    }
    #time-slider {
      flex: 1;
      min-width: 100px;
    }
    #time-display {
      font-size: 16px;
      font-weight: bold;
      font-family: monospace;
      color: #fff;
      min-width: 70px;
      text-align: right;
    }
    #info-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 16px;
      background: #12122a;
      border-bottom: 1px solid #222;
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    #ctc-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #drop-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #666;
    }
    #drop-overlay.drag-hover {
      background: rgba(50, 50, 100, 0.5);
      color: #aaa;
    }
    #train-info {
      position: absolute;
      right: 16px;
      top: 16px;
      background: rgba(20, 20, 50, 0.95);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 12px;
      font-family: 'Consolas', 'Meiryo', monospace;
      color: #ccc;
      max-width: 320px;
      max-height: 60vh;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }
    #train-info.visible { display: block; }
    #train-info h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #fff;
    }
    #train-info .close-btn {
      float: right;
      cursor: pointer;
      color: #888;
      font-size: 16px;
    }
    #train-info .close-btn:hover { color: #fff; }
    #train-info table { border-collapse: collapse; width: 100%; }
    #train-info td { padding: 1px 6px; }
    #train-info .stop { color: #8f8; }
    #train-info .pass { color: #888; }
    #train-info .current { background: rgba(100, 100, 255, 0.3); }
  </style>
</head>
<body>
  <div id="toolbar">
    <input type="file" id="file-input" accept=".oud,.oud2" />
    <button id="btn-play" title="再生/停止">▶</button>
    <button id="btn-slower" title="減速">-</button>
    <span id="speed-display">x1</span>
    <button id="btn-faster" title="加速">+</button>
    <button id="btn-label-mode" title="表示切替: 列車番号/種別">番号</button>
    <input type="range" id="time-slider" min="0" max="1440" step="0.1" value="600" />
    <span id="time-display">10:00</span>
  </div>
  <div id="info-bar">
    <span id="route-info">ファイルを読み込んでください</span>
    <span id="train-count"></span>
  </div>
  <div id="canvas-container">
    <canvas id="ctc-canvas"></canvas>
    <div id="drop-overlay">OuDia ファイル (.oud / .oud2) をドロップまたは選択</div>
    <div id="train-info"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
